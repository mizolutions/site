<svg id="container" width="504.25" xmlns="http://www.w3.org/2000/svg" class="flowchart" height="222" viewBox="0 0 504.25 222" role="graphics-document document" aria-roledescription="flowchart-v2"><style>#container{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#ccc;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#container .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#container .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#container .error-icon{fill:#a44141;}#container .error-text{fill:#ddd;stroke:#ddd;}#container .edge-thickness-normal{stroke-width:1px;}#container .edge-thickness-thick{stroke-width:3.5px;}#container .edge-pattern-solid{stroke-dasharray:0;}#container .edge-thickness-invisible{stroke-width:0;fill:none;}#container .edge-pattern-dashed{stroke-dasharray:3;}#container .edge-pattern-dotted{stroke-dasharray:2;}#container .marker{fill:lightgrey;stroke:lightgrey;}#container .marker.cross{stroke:lightgrey;}#container svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#container p{margin:0;}#container .label{font-family:"trebuchet ms",verdana,arial,sans-serif;color:#ccc;}#container .cluster-label text{fill:#F9FFFE;}#container .cluster-label span{color:#F9FFFE;}#container .cluster-label span p{background-color:transparent;}#container .label text,#container span{fill:#ccc;color:#ccc;}#container .node rect,#container .node circle,#container .node ellipse,#container .node polygon,#container .node path{fill:#1f2020;stroke:#ccc;stroke-width:1px;}#container .rough-node .label text,#container .node .label text,#container .image-shape .label,#container .icon-shape .label{text-anchor:middle;}#container .node .katex path{fill:#000;stroke:#000;stroke-width:1px;}#container .rough-node .label,#container .node .label,#container .image-shape .label,#container .icon-shape .label{text-align:center;}#container .node.clickable{cursor:pointer;}#container .root .anchor path{fill:lightgrey!important;stroke-width:0;stroke:lightgrey;}#container .arrowheadPath{fill:lightgrey;}#container .edgePath .path{stroke:lightgrey;stroke-width:1px;}#container .flowchart-link{stroke:lightgrey;fill:none;}#container .edgeLabel{background-color:hsl(0, 0%, 34.4117647059%);text-align:center;}#container .edgeLabel p{background-color:hsl(0, 0%, 34.4117647059%);}#container .edgeLabel rect{opacity:0.5;background-color:hsl(0, 0%, 34.4117647059%);fill:hsl(0, 0%, 34.4117647059%);}#container .labelBkg{background-color:rgba(87.75, 87.75, 87.75, 0.5);}#container .cluster rect{fill:hsl(180, 1.5873015873%, 28.3529411765%);stroke:rgba(255, 255, 255, 0.25);stroke-width:1px;}#container .cluster text{fill:#F9FFFE;}#container .cluster span{color:#F9FFFE;}#container div.mermaidTooltip{position:absolute;text-align:center;max-width:200px;padding:2px;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:12px;background:hsl(20, 1.5873015873%, 12.3529411765%);border:1px solid rgba(255, 255, 255, 0.25);border-radius:2px;pointer-events:none;z-index:100;}#container .flowchartTitleText{text-anchor:middle;font-size:18px;fill:#ccc;}#container rect.text{fill:none;stroke-width:0;}#container .icon-shape,#container .image-shape{background-color:hsl(0, 0%, 34.4117647059%);text-align:center;}#container .icon-shape p,#container .image-shape p{background-color:hsl(0, 0%, 34.4117647059%);padding:2px;}#container .icon-shape .label rect,#container .image-shape .label rect{opacity:0.5;background-color:hsl(0, 0%, 34.4117647059%);fill:hsl(0, 0%, 34.4117647059%);}#container .label-icon{display:inline-block;height:1em;overflow:visible;vertical-align:-0.125em;}#container .node .label-icon path{fill:currentColor;stroke:revert;stroke-width:revert;}#container .node .neo-node{stroke:#ccc;}#container [data-look="neo"].node rect,#container [