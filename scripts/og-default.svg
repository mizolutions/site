<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Brand OG card · 1200x630 · matches site tokens (bg #0a0b0c, emerald #34d399).
       Fonts: Liberation Sans / Mono (installed locally so sharp rasterizes text crisply;
       the site's Inter isn't installed in this build env). Regenerate via scripts/build-og.mjs. -->
  <rect width="1200" height="630" fill="#0a0b0c"/>

  <!-- faint elevated panel inset -->
  <rect x="40" y="40" width="1120" height="550" rx="20" fill="#101314"/>

  <!-- logo mark: emerald rounded square with a dark "healthy node" dot -->
  <rect x="96" y="120" width="60" height="60" rx="14" fill="#34d399"/>
  <circle cx="126" cy="150" r="11" fill="#04140d"/>

  <!-- mono kicker: domain -->
  <text x="176" y="160" font-family="'Liberation Mono','DejaVu Sans Mono',monospace"
        font-size="28" letter-spacing="1.5" fill="#9aa1a8">mizolutions.com</text>

  <!-- wordmark -->
  <text x="92" y="368" font-family="'Liberation Sans','DejaVu Sans',sans-serif"
        font-weight="700" font-size="118" fill="#e8eaed">Mizolutions</text>

  <!-- single emerald accent rule -->
  <rect x="100" y="402" width="150" height="6" rx="3" fill="#34d399"/>

  <!-- tagline (operator-chosen) -->
  <text x="98" y="486" font-family="'Liberation Sans','DejaVu Sans',sans-serif"
        font-weight="700" font-size="58" fill="#34d399">DevOps &amp; SRE</text>

  <!-- subtitle: cloud-general positioning (ADR-003) -->
  <text x="100" y="556" font-family="'Liberation Sans','DejaVu Sans',sans-serif"
        font-size="33" fill="#9aa1a8">Reliability · Cloud · Infrastructure-as-Code</text>
</svg>
